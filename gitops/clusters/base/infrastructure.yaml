---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: namespaces
  namespace: flux-system
spec:
  interval: 3m0s
  retryInterval: 1m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: cluster-config
  path: ./gitops/infrastructure/configs/namespaces
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns-weu
  namespace: flux-system
spec:
  dependsOn:
    - name: namespaces
  interval: 3m0s
  retryInterval: 1m0s
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: cluster-config
  path: ./gitops/infrastructure/controllers/external-dns
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: service-router
  namespace: flux-system
spec:
  dependsOn:
    - name: namespaces
  interval: 3m0s
  retryInterval: 1m0s
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: cluster-config
  path: ./gitops/infrastructure/controllers/service-router
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: service-router-config
  namespace: flux-system
spec:
  dependsOn:
    - name: namespaces
    - name: service-router
  interval: 3m0s
  retryInterval: 1m0s
  timeout: 5m
  path: ./gitops/infrastructure/configs/service-router
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: cluster-config
